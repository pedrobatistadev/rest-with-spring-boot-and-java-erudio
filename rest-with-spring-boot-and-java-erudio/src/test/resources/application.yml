server:
  port: 8888
cors:
  originPatterns: http://localhost:8080,https://github.com/pedrobatistadev
file:
  upload-dir: /Users/pedro/Documentos/UploadDir
spring:
  application:
    name: rest-with-spring-boot-and-java-erudio
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      file-size-threshould: 2KB
      max-file-size: 200MB
      max-request-size: 215MB
logging:
  level:
    root: INFO
    #br.com.erudio: WARN
spring-doc:
  paths-to-match: /person/v1/**
  swagger-ui:
    use-root-path: true

